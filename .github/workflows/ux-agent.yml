name: UX Agent

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *'

permissions:
  contents: read

jobs:
  ux-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      UX_CLUB_SLUG: asv-rotauge
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.UX_AGENT_CHECKOUT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Prepare env
        run: |
          if [ ! -f .env.local ]; then
            cp .env.example .env.local
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UX agent checks
        run: npm run test:ux

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: tests/ux-agent/artifacts/playwright/html
          if-no-files-found: ignore

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-report
          path: tests/ux-agent/artifacts/lighthouse
          if-no-files-found: ignore
