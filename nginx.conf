server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # OneSignal-Worker (neu + legacy) duerfen nie in /index.html/Login umgeschrieben werden.
  location ^~ /push/onesignal/ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/javascript;
    try_files $uri =404;
  }

  # OneSignal Page SDK optional ueber same-origin bereitstellen.
  # Vorteil: robuster gegen restriktive CSP/Tracking-Schutz, da der Browser nur unsere Domain laedt.
  location = /push/onesignal/OneSignalSDK.page.js {
    add_header Cache-Control "public, max-age=300" always;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn.onesignal.com;
    proxy_pass https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js;
  }

  # OneSignal SW-SDK same-origin Proxy, damit Worker-Imports nicht am CDN-Block scheitern.
  location = /push/onesignal/OneSignalSDK.sw.cdn.js {
    add_header Cache-Control "public, max-age=300" always;
    default_type application/javascript;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn.onesignal.com;
    proxy_pass https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.sw.js;
  }

  location = /OneSignalSDKWorker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/javascript;
    try_files $uri =404;
  }

  location = /OneSignalSDKUpdaterWorker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/javascript;
    try_files $uri =404;
  }

  location = /OneSignalSDK.sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/javascript;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /manifest.json {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /robots.txt {
    add_header Cache-Control "public, max-age=300" always;
    default_type text/plain;
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
